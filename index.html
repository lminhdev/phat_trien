<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TÀI LIỆU THPTQG</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <i class="fa-solid fa-server"></i>
                <h1>Kho Tài Liệu Ôn Thi THPTQG</h1>
            </div>
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Tìm kiếm thư mục...">
            </div>
        </header>

        <main>
            <div class="section-title">
                <h2>Thư Mục Hệ Thống</h2>
                <span class="item-count" id="itemCount">Đang tải...</span>
            </div>

            <div class="grid-container" id="folderGrid">
                
                <a href="#" class="folder-card">
                    <div class="folder-icon math-color"><i class="fa-solid fa-calculator"></i></div>
                    <div class="folder-info">
                        <h3>Tài liệu Toán</h3>
                        <p>Toán THPT</p>
                    </div>
                </a>

                <a href="#" class="folder-card">
                    <div class="folder-icon doc-color"><i class="fa-solid fa-atom"></i></div>
                    <div class="folder-info">
                        <h3>Tài liệu Lý</h3>
                        <p>Lý THPT</p>
                    </div>
                </a>

                <a href="anh.html" class="folder-card">
                    <div class="folder-icon cyber-color"><i class="fa-solid fa-language"></i></div>
                    <div class="folder-info">
                        <h3>Tài liệu Anh</h3>
                        <p>Anh THPT</p>
                    </div>
                </a>

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
