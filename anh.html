    <style>
        .back-btn { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--accent); margin-bottom: 2rem; font-weight: 600; }

        .file-list { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .file-item { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); padding: 1.25rem; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .file-item:hover { background: var(--hover-bg); border-color: rgba(255, 255, 255, 0.2); transform: translateX(4px); }
        .file-name { display: flex; align-items: center; gap: 0.75rem; font-weight: 500; }
        .file-name i { font-size: 1.25rem; color: #10b981; }
        .download-btn { background: var(--accent); color: white; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; font-weight: 600; transition: opacity 0.2s; }
        .download-btn:hover { opacity: 0.9; }
    </style>
